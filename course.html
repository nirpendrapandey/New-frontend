<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SarkariNext Courses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://www.youtube.com/iframe_api" async></script>
  <link rel="stylesheet" href="./css/course.css" />
  <link rel="stylesheet" href="./css/mobile-app.css">
  <script src="./js/mobile-app.js" defer></script>
</head>

<body>

  <div class="course-app">

    <!-- LEFT PANEL (Drawer on mobile) -->
    <div class="course-left" id="courseSidebar">

      <div class="brand-box">
        <h2><span class="sarkari-text">Sarkari</span><span class="next-text">Next</span></h2>
        <p>Free learning • Smart prep • Daily growth</p>
      </div>

      <!-- TOP BUTTONS -->
      <div class="left-actions">
        <button class="course-btn active" type="button">Courses</button>
      </div>

      <!-- SUBJECTS / TOPICS -->
      <div id="subjectArea" class="left-subject-area"></div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="course-right">

      <!-- Mobile Header Tools -->
      <div class="mobile-player-header">
        <button id="toggleSidebar" class="toggle-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          <span>Show Subjects</span>
        </button>
      </div>

      <div class="player-wrap">

        <div class="player-box" id="playerBox">
          <!-- The IFrame will be replaced by YT.Player -->
          <div id="videoPlayer"></div>
          
          <!-- Custom Overlay & Controls -->
          <div class="player-overlay" id="playerOverlay">
            <div class="overlay-center">
              <button class="seek-btn" onclick="seekRelative(-10); event.stopPropagation();">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><path d="M10.85 15.28h.81v-3.71h-.05l-1.24.88.42.64.77-.53v2.72zm2.14-2.12c0-.38.07-.7.21-.96.14-.26.33-.45.58-.58.25-.13.54-.19.88-.19.33 0 .61.06.85.19.24.13.43.32.57.58.14.26.21.58.21.96v1.14c0 .38-.07.7-.21.96-.14.26-.33.45-.58.58-.25.13-.54.19-.88.19-.33 0-.61-.06-.85-.19-.24-.13-.43-.32-.57-.58-.14-.26-.21-.58-.21-.96v-1.14zm.83 1.17c0 .31.05.54.14.7.09.16.24.24.44.24.2 0 .34-.08.43-.24.09-.16.14-.39.14-.7v-1.19c0-.31-.05-.54-.14-.7-.09-.16-.24-.24-.43-.24-.2 0-.35.08-.44.24-.09.16-.14.39-.14.7v1.19z"/></svg>
              </button>

              <button id="playPauseCenter" class="center-play-btn">
                <svg class="play-icon" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg class="pause-icon hidden" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
              </button>

              <button class="seek-btn" onclick="seekRelative(10); event.stopPropagation();">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"/><path d="M10.85 15.28h.81v-3.71h-.05l-1.24.88.42.64.77-.53v2.72zm2.14-2.12c0-.38.07-.7.21-.96.14-.26.33-.45.58-.58.25-.13.54-.19.88-.19.33 0 .61.06.85.19.24.13.43.32.57.58.14.26.21.58.21.96v1.14c0 .38-.07.7-.21.96-.14.26-.33.45-.58.58-.25.13-.54.19-.88.19-.33 0-.61-.06-.85-.19-.24-.13-.43-.32-.57-.58-.14-.26-.21-.58-.21-.96v-1.14zm.83 1.17c0 .31.05.54.14.7.09.16.24.24.44.24.2 0 .34-.08.43-.24.09-.16.14-.39.14-.7v-1.19c0-.31-.05-.54-.14-.7-.09-.16-.24-.24-.43-.24-.2 0-.35.08-.44.24-.09.16-.14.39-.14.7v1.19z"/></svg>
              </button>
            </div>
            
            <div class="player-controls">
              <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                  <div class="progress-filled" id="progressFilled"></div>
                  <div class="progress-handle"></div>
                </div>
              </div>
              
              <div class="controls-row">
                <div class="left-controls">
                  <button id="playPauseSmall" class="control-btn">
                    <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="pause-icon hidden" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                  </button>
                  <div class="time-display">
                    <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                  </div>
                </div>
                <div class="right-controls">
                  <button id="fullscreenBtn" class="control-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="player-bottom">
          <div id="videoTitle">Select a topic to start learning</div>
          <p class="player-hint">Premium Custom Player • Ad-free Experience</p>
        </div>

      </div>

    </div>

  </div>

  <script src="./js/course.js"></script>



</body>
</html>
